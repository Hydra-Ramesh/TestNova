version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: testnova-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: testnova-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: testnova-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: testnova-backend
    ports:
      - "5000:5000"
    env_file:
      - ../.env
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: testnova-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  ai-service:
    build:
      context: ../ai-service
      dockerfile: ../docker/Dockerfile.ai-service
    container_name: testnova-ai
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      - qdrant
      - redis
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: testnova-nginx
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend
      - ai-service
    restart: unless-stopped

volumes:
  mongo_data:
  qdrant_data:
