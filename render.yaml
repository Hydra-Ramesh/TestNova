services:
  - type: web
    name: testnova-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: UPSTASH_REDIS_URL
        sync: false
      - key: UPSTASH_REDIS_TOKEN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: AI_SERVICE_URL
        sync: false
      - key: CLIENT_URL
        sync: false

  - type: web
    name: testnova-ai
    runtime: python
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_KEY_1
        sync: false
      - key: GROQ_GENERATION_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_CHAT_MODEL
        value: llama-3.1-8b-instant
